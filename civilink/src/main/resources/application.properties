# -------------------------
# Nom de l'application et port
# -------------------------
spring.application.name=civilink
# Railway fournit automatiquement le port via la variable d'environnement PORT
server.port=${PORT:8080}

# -------------------------
# Configuration de la base de données PostgreSQL (Railway)
# -------------------------
spring.datasource.url=jdbc:postgresql://postgres.railway.internal:5432/railway
spring.datasource.username=postgres
spring.datasource.password=GKHttJAZrKGntnkgHYvxsZIXqMuWrBSO
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------
# Flyway - Version control pour les migrations de base de données
# -------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true

# -------------------------
# JPA Configuration
# -------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# -------------------------
# Security Configuration
# -------------------------
app.security.token-secret=mySecureTokenSecret12345678901234567890
app.security.access-token-expiration-seconds=3600
app.security.refresh-token-expiration-seconds=604800

# -------------------------
# CORS Configuration - autorise ton frontend Flutter Web
# -------------------------
# Ant-style patterns are supported by `allowedOriginPatterns`.
# Configure `CORS_ALLOWED_ORIGINS` on Railway with your frontend URL(s) (comma-separated) if you use a custom domain.
# Default: allow Railway subdomains + localhost for dev.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://*.railway.app,https://*.up.railway.app,http://localhost:*,http://127.0.0.1:*}

# -------------------------
# File Upload
# -------------------------
app.upload-dir=uploads

# -------------------------
# Static resources (Flutter Web)
# -------------------------
# In Docker/Railway we copy the Flutter build into `/app/static` (see `Dockerfile`).
# Put the file location first so it overrides any old classpath assets.
spring.web.resources.static-locations=${STATIC_LOCATIONS:file:/app/static/,classpath:/static/}

# -------------------------
# Google Maps (Web index bootstrap)
# -------------------------
# Exposed to the client via `/env.js`. Set `GOOGLE_MAPS_API_KEY` in Railway variables.
app.google-maps.api-key=${GOOGLE_MAPS_API_KEY:}
